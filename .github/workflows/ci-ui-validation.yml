name: 🧪 UI Validation

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/data/**"
      - "index.html"
      - "vite.config.ts"
      - ".github/workflows/ci-ui-validation.yml"
  pull_request:
    paths:
      - "src/**"
      - "public/data/**"
      - "index.html"
      - "vite.config.ts"
      - ".github/workflows/ci-ui-validation.yml"

jobs:
  ui-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: pip install playwright && playwright install firefox --with-deps

      - run: pnpm build

      - name: Serve dist/ on port 8080
        run: python3 -m http.server 8080 --directory dist &

      - name: Wait for port 8080
        run: npx wait-on http://localhost:8080/ --timeout 60000

      - run: python3 outputs/ui-validation/final_script.py

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-validation-failure
          path: outputs/ui-validation/final_runs/
