name: ✅ Validate Data

on:
  pull_request:
    paths:
      - "public/data/**"
      - "src/lib/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vite.config.ts"
      - ".github/workflows/validate-data.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

      - name: Check data files are valid JSON
        run: |
          find public/data -name '*.json' -exec sh -c 'echo "Validating {}..." && node -e "JSON.parse(require(\"fs\").readFileSync(\"{}\", \"utf8\"))"' \;
